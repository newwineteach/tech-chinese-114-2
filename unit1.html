                            <>
                                {data.pain && (
                                    <div className="space-y-2">
                                        <div className="flex items-center text-slate-800 font-semibold space-x-2">
                                            <div className="p-1 bg-red-50 rounded-lg"><IconPain /></div> <span>痛點分析</span>
                                        </div>
                                        <p className="pl-8 text-slate-600">{data.pain}</p>
                                    </div>
                                )}
                                {data.solution && (
                                    <div className="space-y-2">
                                        <div className="flex items-center text-slate-800 font-semibold space-x-2">
                                            <div className="p-1 bg-yellow-50 rounded-lg"><IconSolution /></div> <span>產品功能</span>
                                        </div>
                                        <p className="pl-8 text-slate-600">{data.solution}</p>
                                    </div>
                                )}
                                {data.risk && (
                                    <div className="space-y-2">
                                        <div className="flex items-center text-slate-800 font-semibold space-x-2">
                                            <div className="p-1 bg-purple-50 rounded-lg"><IconRisk /></div> <span>風險評估</span>
                                        </div>
                                        <p className="pl-8 text-slate-600">{data.risk}</p>
                                    </div>
                                )}
                                {data.business && (
                                    <div className="space-y-2">
                                        <div className="flex items-center text-slate-800 font-semibold space-x-2">
                                            <div className="p-1 bg-green-50 rounded-lg"><IconBusiness /></div> <span>定價推廣</span>
                                        </div>
                                        <p className="pl-8 text-slate-600">{data.business}</p>
                                    </div>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        };

        // Unit 1 頁面組件
        const Unit1Page = () => {
            return (
                <div className="max-w-6xl mx-auto px-4 py-8 fade-in">
                    {/* 返回按鈕與標題 */}
                    <a href="index.html" className="inline-flex items-center space-x-2 text-slate-500 hover:text-primary transition-colors mb-8 group">
                        <div className="p-2 rounded-full group-hover:bg-teal-50 transition-colors">
                            <IconArrowLeft />
                        </div>
                        <span className="font-medium">返回課程首頁</span>
                    </a>

                    <div className="mb-12 text-center">
                        <span className="inline-block py-1.5 px-4 rounded-full bg-teal-100 text-primary text-sm font-bold mb-4 tracking-wider shadow-sm">UNIT 1</span>
                        <h1 className="text-3xl md:text-5xl font-extrabold text-slate-800 mb-4 tracking-tight">校園 AI 助手提案</h1>
                        <p className="text-slate-500 max-w-2xl mx-auto text-lg">本單元透過 PBL (Project-Based Learning) 專題任務，引導學生觀察校園生活痛點，並提出具創意的 AI 解決方案與商業模式。</p>
                    </div>

                    {/* 德全的提案指南 (Highlight Box) */}
                    <div className="bg-gradient-to-br from-slate-800 to-slate-900 rounded-3xl p-6 md:p-10 mb-14 text-white shadow-2xl relative overflow-hidden">
                        {/* 背景裝飾光暈 */}
                        <div className="absolute top-0 right-0 -mr-20 -mt-20 w-64 h-64 rounded-full bg-teal-500 opacity-10 blur-3xl"></div>
                        <div className="absolute bottom-0 left-0 -ml-20 -mb-20 w-64 h-64 rounded-full bg-blue-500 opacity-10 blur-3xl"></div>
                        
                        <div className="relative z-10">
                            <div className="flex items-center space-x-3 mb-4">
                                <IconLightbulb />
                                <h2 className="text-2xl font-bold text-teal-300">提案的四大核心支柱 (指導原則)</h2>
                            </div>
                            <p className="text-slate-300 mb-8 text-base">以下由 <span className="text-white font-medium bg-white/10 px-2 py-0.5 rounded">德全</span> 同學整理分享，為整個專案的評估框架：</p>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-slate-800/60 p-5 rounded-2xl border border-slate-700/50 hover:bg-slate-800 transition-colors">
                                    <h3 className="text-teal-400 font-bold mb-2 flex items-center text-lg"><IconPain/> <span className="ml-2">1. 痛點分析 (Pain Point)</span></h3>
                                    <p className="text-sm text-slate-300 leading-relaxed">這是整個提案的心臟。如果沒有準確抓到對方的痛苦或需求，後面的解決方案再華麗也沒意義。</p>
                                </div>
                                <div className="bg-slate-800/60 p-5 rounded-2xl border border-slate-700/50 hover:bg-slate-800 transition-colors">
                                    <h3 className="text-yellow-400 font-bold mb-2 flex items-center text-lg"><IconSolution/> <span className="ml-2">2. 產品功能 (Solution)</span></h3>
                                    <p className="text-sm text-slate-300 leading-relaxed">這部分不應只是列出規格，而是要強調「效益」。功能是工具，解決方案才是價值，必須證明功能是針對痛點量身打造的。</p>
                                </div>
                                <div className="bg-slate-800/60 p-5 rounded-2xl border border-slate-700/50 hover:bg-slate-800 transition-colors">
                                    <h3 className="text-purple-400 font-bold mb-2 flex items-center text-lg"><IconRisk/> <span className="ml-2">3. 風險評估 (Risk)</span></h3>
                                    <p className="text-sm text-slate-300 leading-relaxed">這是最容易被忽視卻也最能展現專業度的一環。主動提出風險，代表你考慮周全，不是在畫大餅。</p>
                                </div>
                                <div className="bg-slate-800/60 p-5 rounded-2xl border border-slate-700/50 hover:bg-slate-800 transition-colors">
                                    <h3 className="text-green-400 font-bold mb-2 flex items-center text-lg"><IconBusiness/> <span className="ml-2">4. 定價推廣 (Business)</span></h3>
                                    <p className="text-sm text-slate-300 leading-relaxed">這是在談論「資源分配」與「成效回報」。提案不能只談理想必須落地，包含成本投入與如何將價值極大化。</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 學生提案分類網格 */}
                    <div className="flex items-center justify-between mb-8 pb-4 border-b border-slate-200">
                        <h2 className="text-2xl font-bold text-slate-800">學生提案分類總覽</h2>
                        <span className="text-sm text-primary bg-teal-50 px-4 py-1.5 rounded-full font-semibold border border-teal-100">共 {proposals.length} 份作品</span>
                    </div>
                    
                    <div className="space-y-16">
                        {categories.map(category => {
                            const categoryProposals = proposals.filter(p => p.categoryId === category.id);
                            // 若該分類沒有提案，則不顯示
                            if (categoryProposals.length === 0) return null;
                            
                            return (
                                <div key={category.id} className="scroll-mt-24">
                                    <div className="mb-6">
                                        <h3 className="text-2xl font-bold text-slate-800 flex items-center">
                                            {category.name}
                                            <span className="ml-3 text-sm font-medium bg-slate-100 text-slate-500 px-2.5 py-0.5 rounded-full">
                                                {categoryProposals.length} 份提案
                                            </span>
                                        </h3>
                                        <p className="text-slate-500 mt-2">{category.desc}</p>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                        {categoryProposals.map((item, index) => (
                                            <ProposalCard key={`${category.id}-${index}`} data={item} />
                                        ))}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // 主要 App 組件
        const App = () => {
            return (
                <div className="min-h-screen flex flex-col">
                    {/* Navigation Bar */}
                    <nav className="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                            <a href="index.html" className="flex items-center space-x-2 cursor-pointer hover:opacity-80 transition-opacity">
                                <div className="w-8 h-8 bg-gradient-to-br from-teal-400 to-primary text-white rounded-lg flex items-center justify-center font-bold shadow-sm">
                                    科
                                </div>
                                <span className="font-bold text-slate-800 text-lg tracking-wide">114-2 科技華語</span>
                            </a>
                            
                            <div className="text-sm font-medium text-slate-600 bg-slate-100 px-4 py-1.5 rounded-full flex items-center shadow-sm">
                                <IconHome /> <span className="ml-2">單元作業</span>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="flex-1">
                        <Unit1Page />
                    </main>

                    {/* Footer */}
                    <footer className="bg-white border-t border-slate-200 py-10 mt-12 text-center text-slate-500 text-sm">
                        <div className="max-w-6xl mx-auto px-4 flex flex-col items-center">
                            <div className="w-10 h-1 bg-slate-200 rounded-full mb-6"></div>
                            <p className="font-medium text-slate-600 mb-1">© 2026 114-2 科技華語課程專案。保留所有權利。</p>
                            <p className="text-slate-400">Powered by React & Tailwind CSS</p>
                        </div>
                    </footer>
                </div>
            );
        };

        // 渲染 App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
