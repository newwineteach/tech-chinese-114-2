<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>114-2 科技華語 - 課程作業集</title>
    <!-- 引入 Tailwind CSS 進行快速且美觀的樣式設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 以在瀏覽器中編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0d9488', // Teal 600
                        secondary: '#14b8a6', // Teal 500
                        bglight: '#f0fdfa', // Teal 50
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            background-color: #f8fafc;
        }
        /* 自定義滾動條 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- SVG 圖示組件 ---
        const IconHome = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const IconLock = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-slate-400 mb-2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const IconUnlock = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-primary mb-2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>;

        // --- 資料設定 ---
        const assignments = [
            { id: 1, title: "Unit 1", subtitle: "校園 AI 助手提案", status: "active", desc: "學生設計的創新 AI 小工具，解決校園生活痛點。", link: "unit1.html" },
            { id: 2, title: "Unit 2", subtitle: "即將解鎖", status: "locked", desc: "第二次作業內容敬請期待...", link: "#" },
            { id: 3, title: "Unit 3", subtitle: "即將解鎖", status: "locked", desc: "第三次作業內容敬請期待...", link: "#" },
            { id: 4, title: "Unit 4", subtitle: "即將解鎖", status: "locked", desc: "第四次作業內容敬請期待...", link: "#" },
            { id: 5, title: "Unit 5", subtitle: "即將解鎖", status: "locked", desc: "第五次作業內容敬請期待...", link: "#" },
            { id: 6, title: "Unit 6", subtitle: "即將解鎖", status: "locked", desc: "第六次作業內容敬請期待...", link: "#" },
            { id: 7, title: "Unit 7", subtitle: "即將解鎖", status: "locked", desc: "第七次作業內容敬請期待...", link: "#" },
            { id: 8, title: "Unit 8", subtitle: "即將解鎖", status: "locked", desc: "第八次作業內容敬請期待...", link: "#" },
        ];

        // 首頁組件
        const HomePage = () => {
            return (
                <div className="max-w-6xl mx-auto px-4 py-12 fade-in">
                    {/* Header */}
                    <div className="text-center mb-16">
                        <h1 className="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-600 to-blue-600 mb-4 py-2">
                            114-2 科技華語
                        </h1>
                        <p className="text-lg text-slate-500">課程作業與專題作品展示集</p>
                    </div>

                    {/* Grid of Assignments */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        {assignments.map((unit) => (
                            <a 
                                key={unit.id}
                                href={unit.link}
                                className={`
                                    relative p-6 rounded-2xl border transition-all duration-300 block
                                    ${unit.status === 'active' 
                                        ? 'bg-white border-teal-100 shadow-md hover:shadow-xl hover:-translate-y-1 cursor-pointer group' 
                                        : 'bg-slate-50/50 border-slate-200 cursor-not-allowed opacity-80'}
                                `}
                                onClick={(e) => unit.status !== 'active' && e.preventDefault()}
                            >
                                <div className="flex flex-col items-center text-center h-full">
                                    {unit.status === 'active' ? <IconUnlock /> : <IconLock />}
                                    
                                    <h3 className={`font-bold text-xl mb-1 ${unit.status === 'active' ? 'text-slate-800 group-hover:text-primary transition-colors' : 'text-slate-400'}`}>
                                        {unit.title}
                                    </h3>
                                    <h4 className={`font-medium mb-3 ${unit.status === 'active' ? 'text-teal-600' : 'text-slate-400'}`}>
                                        {unit.subtitle}
                                    </h4>
                                    <p className={`text-sm mt-auto ${unit.status === 'active' ? 'text-slate-500' : 'text-slate-400'}`}>
                                        {unit.desc}
                                    </p>
                                    
                                    {unit.status === 'active' && (
                                        <div className="mt-4 pt-4 border-t border-slate-100 w-full text-primary text-sm font-semibold opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                            進入查看 <span className="ml-1">→</span>
                                        </div>
                                    )}
                                </div>
                            </a>
                        ))}
                    </div>
                </div>
            );
        };

        // 主要 App 組件
        const App = () => {
            return (
                <div className="min-h-screen flex flex-col">
                    {/* Navigation Bar */}
                    <nav className="bg-white border-b border-slate-200 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                            <a href="index.html" className="flex items-center space-x-2 cursor-pointer hover:opacity-80 transition-opacity">
                                <div className="w-8 h-8 bg-gradient-to-br from-teal-400 to-primary text-white rounded-lg flex items-center justify-center font-bold">
                                    科
                                </div>
                                <span className="font-bold text-slate-800 text-lg tracking-wide">114-2 科技華語</span>
                            </a>
                            
                            <div className="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full flex items-center">
                                <IconHome /> <span className="ml-2">課程首頁</span>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="flex-1">
                        <HomePage />
                    </main>

                    {/* Footer */}
                    <footer className="bg-white border-t border-slate-200 py-8 text-center text-slate-500 text-sm">
                        <p>© 2026 114-2 科技華語課程專案。保留所有權利。</p>
                        <p className="mt-1">Powered by React & Tailwind CSS</p>
                    </footer>
                </div>
            );
        };

        // 渲染 App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
